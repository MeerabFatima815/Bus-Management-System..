<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passengers & Bookings – BMS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; }
    .tab-btn { padding:0.55rem 1.4rem; border-radius:var(--radius); border:2px solid var(--primary); background:transparent; color:var(--primary); font-weight:600; font-size:0.9rem; cursor:pointer; transition:background 0.2s, color 0.2s; }
    .tab-btn.active { background:var(--primary); color:var(--white); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">🚌 <span>BMS</span> Bus Management</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="buses.html">Buses</a>
      <a href="bookings.html" class="active">Bookings</a>
      <a href="login.html" class="btn-nav" id="navBtn">Login</a>
    </div>
  </nav>

  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-label">Main Menu</div>
      <a href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
      <a href="buses.html"><span class="icon">🚌</span> Buses</a>
      <a href="bookings.html" class="active"><span class="icon">🎫</span> Passengers & Bookings</a>
    </div>

    <div class="main-content">
      <div class="page-header"><h1>👥 Passengers & Bookings</h1></div>

      <div class="tabs">
        <button class="tab-btn active" id="tabP" onclick="switchTab('passengers')">👥 Passengers</button>
        <button class="tab-btn" id="tabB" onclick="switchTab('bookings')">🎫 Bookings</button>
      </div>

      <div class="tab-panel active" id="panel-passengers">
        <div class="page-header" style="margin-bottom:1rem;">
          <span></span>
          <button class="btn btn-primary" onclick="openModal('addPassengerModal')">+ Add Passenger</button>
        </div>
        <div class="search-bar">
          <input type="text" id="passengerSearch" placeholder="Search by name or email..." oninput="loadPassengers()" />
        </div>
        <div class="card">
          <div class="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Email</th><th>Actions</th></tr></thead>
              <tbody id="passengerTable">
                <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-light);">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="tab-panel" id="panel-bookings">
        <div class="page-header" style="margin-bottom:1rem;">
          <span></span>
          <button class="btn btn-primary" onclick="openBookingModal()">+ New Booking</button>
        </div>
        <div class="card">
          <div class="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Booking ID</th><th>Passenger ID</th><th>Bus ID</th><th>Seat #</th><th>Date</th><th>Action</th></tr></thead>
              <tbody id="bookingTable">
                <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-light);">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD PASSENGER MODAL -->
  <div class="modal-overlay" id="addPassengerModal">
    <div class="modal">
      <div class="modal-header"><h2>👤 Add Passenger</h2><button class="modal-close" onclick="closeModal('addPassengerModal')">✕</button></div>
      <div class="form-group"><label>Full Name</label><input type="text" id="pName" placeholder="Ali Khan" /></div>
      <div class="form-group"><label>Phone</label><input type="text" id="pPhone" placeholder="03001234567" /></div>
      <div class="form-group"><label>Email</label><input type="email" id="pEmail" placeholder="ali@email.com" /></div>
      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;" onclick="addPassenger()">Add Passenger</button>
    </div>
  </div>

  <!-- EDIT PASSENGER MODAL -->
  <div class="modal-overlay" id="editPassengerModal">
    <div class="modal">
      <div class="modal-header"><h2>✏️ Edit Passenger</h2><button class="modal-close" onclick="closeModal('editPassengerModal')">✕</button></div>
      <input type="hidden" id="editPassengerId" />
      <div class="form-group"><label>Full Name</label><input type="text" id="epName" /></div>
      <div class="form-group"><label>Phone</label><input type="text" id="epPhone" /></div>
      <div class="form-group"><label>Email</label><input type="email" id="epEmail" /></div>
      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;" onclick="updatePassenger()">Update</button>
    </div>
  </div>

  <!-- ADD BOOKING MODAL -->
  <div class="modal-overlay" id="addBookingModal">
    <div class="modal">
      <div class="modal-header"><h2>🎫 New Booking</h2><button class="modal-close" onclick="closeModal('addBookingModal')">✕</button></div>
      <div class="form-group"><label>Passenger</label><select id="bPassenger"><option value="">-- Select Passenger --</option></select></div>
      <div class="form-group"><label>Bus</label><select id="bBus"><option value="">-- Select Bus --</option></select></div>
      <div class="form-row">
        <div class="form-group"><label>Seat Number</label><input type="number" id="bSeat" min="1" placeholder="e.g. 12" /></div>
        <div class="form-group"><label>Booking Date</label><input type="date" id="bDate" /></div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;" onclick="addBooking()">Book Ticket</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = "https://bus-management-system-production-9059.up.railway.app";

    const userRaw = localStorage.getItem('bms_user');
    if (userRaw) {
      const btn = document.getElementById('navBtn');
      btn.textContent = 'Logout'; btn.href = '#';
      btn.addEventListener('click', () => { localStorage.removeItem('bms_user'); location.href = 'login.html'; });
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function openModal(id)  { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function switchTab(name) {
      document.getElementById('tabP').classList.toggle('active', name === 'passengers');
      document.getElementById('tabB').classList.toggle('active', name === 'bookings');
      document.getElementById('panel-passengers').classList.toggle('active', name === 'passengers');
      document.getElementById('panel-bookings').classList.toggle('active', name === 'bookings');
      if (name === 'bookings') loadBookings();
    }

    async function loadPassengers() {
      const search = document.getElementById('passengerSearch').value.trim();
      const tbody  = document.getElementById('passengerTable');
      try {
        const url  = search ? `${API}/passengers?search=${encodeURIComponent(search)}` : `${API}/passengers`;
        const res  = await fetch(url);
        if (!res.ok) throw new Error();
        const list = await res.json();
        if (list.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-light);">No passengers yet.</td></tr>';
          return;
        }
        tbody.innerHTML = list.map((p, i) => `
          <tr>
            <td>${i + 1}</td>

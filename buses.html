  FILE: buses.html  (Bus Management Page)
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bus Management – BMS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo">🚌 <span>BMS</span> Bus Management</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="buses.html" class="active">Buses</a>
      <a href="bookings.html">Bookings</a>
      <a href="login.html" class="btn-nav" id="navBtn">Login</a>
    </div>
  </nav>

  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-label">Main Menu</div>
      <a href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
      <a href="buses.html" class="active"><span class="icon">🚌</span> Buses</a>
      <a href="bookings.html"><span class="icon">🎫</span> Passengers & Bookings</a>
    </div>

    <div class="main-content">
      <div class="page-header">
        <h1>🚌 Bus Management</h1>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add New Bus</button>
      </div>

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by bus number or name..." oninput="loadBuses()" />
        <button class="btn btn-primary" onclick="loadBuses()">Search</button>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>#</th><th>Bus Number</th><th>Bus Name</th><th>Capacity</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="busTable">
              <tr><td colspan="6" style="text-align:center; padding:2rem; color:var(--text-light);">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD BUS MODAL -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <h2>🚌 Add New Bus</h2>
        <button class="modal-close" onclick="closeModal('addModal')">✕</button>
      </div>
      <div class="form-group"><label>Bus Number</label><input type="text" id="addBusNumber" placeholder="e.g. BUS-001" /></div>
      <div class="form-group"><label>Bus Name</label><input type="text" id="addBusName" placeholder="e.g. City Express" /></div>
      <div class="form-row">
        <div class="form-group"><label>Capacity</label><input type="number" id="addCapacity" placeholder="e.g. 40" min="1" /></div>
        <div class="form-group"><label>Status</label>
          <select id="addStatus"><option>Active</option><option>Inactive</option></select>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;" onclick="addBus()">Add Bus</button>
    </div>
  </div>

  <!-- EDIT BUS MODAL -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h2>✏️ Edit Bus</h2>
        <button class="modal-close" onclick="closeModal('editModal')">✕</button>
      </div>
      <input type="hidden" id="editBusId" />
      <div class="form-group"><label>Bus Number</label><input type="text" id="editBusNumber" /></div>
      <div class="form-group"><label>Bus Name</label><input type="text" id="editBusName" /></div>
      <div class="form-row">
        <div class="form-group"><label>Capacity</label><input type="number" id="editCapacity" min="1" /></div>
        <div class="form-group"><label>Status</label>
          <select id="editStatus"><option>Active</option><option>Inactive</option></select>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;" onclick="updateBus()">Update Bus</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = "https://bus-management-system-production-9059.up.railway.app";

    const userRaw = localStorage.getItem('bms_user');
    if (userRaw) {
      const btn = document.getElementById('navBtn');
      btn.textContent = 'Logout';
      btn.href = '#';
      btn.addEventListener('click', () => { localStorage.removeItem('bms_user'); location.href = 'login.html'; });
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function openAddModal() { document.getElementById('addModal').classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    async function loadBuses() {
      const search = document.getElementById('searchInput').value.trim();
      const tbody  = document.getElementById('busTable');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:1rem;color:var(--text-light);">Loading...</td></tr>';
      try {
        const url   = search ? `${API}/buses?search=${encodeURIComponent(search)}` : `${API}/buses`;
        const res   = await fetch(url);
        if (!res.ok) throw new Error('Server error');
        const buses = await res.json();
        if (buses.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-light);">No buses found.</td></tr>';
          return;
        }
        tbody.innerHTML = buses.map((b, i) => `
          <tr>
            <td>${i + 1}</td>
            <td><strong>${b.bus_number}</strong></td>
            <td>${b.bus_name}</td>
            <td>${b.capacity}</td>
            <td><span class="badge ${b.status === 'Active' ? 'badge-active' : 'badge-inactive'}">${b.status}</span></td>
            <td style="display:flex;gap:0.4rem;">
              <button class="btn btn-outline btn-sm" onclick='openEditModal(${b.bus_id},"${b.bus_number}","${b.bus_name}",${b.capacity},"${b.status}")'>✏️ Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteBus(${b.bus_id})">🗑️ Delete</button>
            </td>
          </tr>`).join('');
      } catch {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--danger);">Cannot load buses.</td></tr>';
      }
    }

    async function addBus() {
      const body = {
        bus_number: document.getElementById('addBusNumber').value.trim(),
        bus_name:   document.getElementById('addBusName').value.trim(),
        capacity:   parseInt(document.getElementById('addCapacity').value),
        status:     document.getElementById('addStatus').value
      };
      if (!body.bus_number || !body.bus_name || !body.capacity) return showToast('Please fill all fields', 'error');
      try {
        const res  = await fetch(`${API}/buses`,
